- name: Run all
  hosts: all
  gather_facts: false
  force_handlers: true
  vars:
    network_prefix: "{{ network_ip_subnet.split('/')[0].split('.')[:3] | join('.') }}"

  tasks:
    - name: Build custom OpenWrt firmware
      ansible.builtin.include_tasks: tasks/build_firmware.yml
      when: build_firmware | default(false) | bool

    - name: End play after firmware build (build-only mode)
      ansible.builtin.meta: end_play
      when: build_firmware_only | default(false) | bool

    - name: Install Python
      ansible.builtin.raw: test -e /usr/bin/python3 || ( apk add python3-light python3-decimal python3-idna python3-logging )
      changed_when: false

    - name: Create initial backup of /etc (first run only, skipped if /root/etc-backup.tar.gz exists)
      ansible.builtin.command:
        cmd: tar -czf /root/etc-backup.tar.gz -C / etc
        creates: /root/etc-backup.tar.gz

    - name: Include tasks
      ansible.builtin.import_tasks: tasks/common.yml

    - name: Include specific tasks
      ansible.builtin.include_tasks: tasks/tasks_{{ inventory_hostname }}.yml
  handlers:
    - name: Import handlers
      ansible.builtin.import_tasks: handlers/main.yml
