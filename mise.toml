[tools]
ansible = { version = "13.6.0", pipx_args = "--preinstall passlib" }
fnox = "1.24.1"
pipx = "1.12.0"

[plugins]
fnox-env = "https://github.com/jdx/mise-env-fnox"

[env]
_.fnox-env = { tools = true }

[tasks."build-firmware:gate-xvx-cz"]
description = "Build OpenWrt firmware for gate.xvx.cz (ASUS RT-AX53U) and display results"
dir = "ansible"
run = 'ansible-playbook --diff main.yml -i inventory/hosts --limit gate.xvx.cz -e build_firmware=true -e build_firmware_only=true 2>&1 | tee /tmp/build-firmware-gate-xvx.cz.log'

[tasks."build-firmware:gate-bracha-xvx-cz"]
description = "Build OpenWrt firmware for gate-bracha.xvx.cz (ZyXEL NBG6617) and display results"
dir = "ansible"
run = 'ansible-playbook --diff main.yml -i inventory/hosts --limit gate-bracha.xvx.cz -e build_firmware=true -e build_firmware_only=true 2>&1 | tee /tmp/build-firmware-gate-bracha.xvx.cz.log'

[tasks."run-ansible-firmware:gate-xvx-cz"]
description = "Build firmware, flash, and configure gate.xvx.cz (ASUS RT-AX53U) using Ansible"
dir = "ansible"
run = 'ansible-playbook --diff main.yml -i inventory/hosts --limit gate.xvx.cz -e build_firmware=true 2>&1 | tee /tmp/build-firmware-gate-xvx.cz.log'

[tasks."run-ansible-firmware:gate-bracha-xvx-cz"]
description = "Build firmware, flash, and configure gate-bracha.xvx.cz (ZyXEL NBG6617) using Ansible"
dir = "ansible"
run = 'ansible-playbook --diff main.yml -i inventory/hosts --limit gate-bracha.xvx.cz -e build_firmware=true 2>&1 | tee /tmp/build-firmware-gate-bracha.xvx.cz.log'

[tasks."run-ansible:gate-xvx-cz"]
description = "Run Ansible playbook for gate.xvx.cz"
dir = "ansible"
run = 'ansible-playbook --diff main.yml -i inventory/hosts --limit gate.xvx.cz 2>&1 | tee /tmp/ansible-openwrt-gate-xvx.cz.log'

[tasks."run-ansible:gate-bracha-xvx-cz"]
description = "Run Ansible playbook for gate-bracha.xvx.cz"
dir = "ansible"
run = 'ansible-playbook --diff main.yml -i inventory/hosts --limit gate-bracha.xvx.cz 2>&1 | tee /tmp/ansible-openwrt-gate-bracha.xvx.cz.log'
